schema_version: "1.0.0"
name: "mindspore-aclnn-operator-devflow"
display_name: "MindSpore ACLNN Operator Devflow"
description: "End-to-end ACLNN operator adaptation workflow for MindSpore Ascend."
version: "0.1.0"

entry:
  type: "manual"
  path: "SKILL.md"

inputs:
  - name: "op_name"
    type: "string"
    required: true
    description: "Target operator name."
  - name: "task"
    type: "enum"
    required: false
    default: "full_devflow"
    choices: ["full_devflow", "yaml", "codegen", "infer", "pyboost", "kbk", "bprop", "test", "docs"]
    description: "Selected ACLNN workflow slice."

outputs:
  report_schema: "skills/_shared/contract/report.schema.json"
  out_dir_layout: "runs/<run_id>/out/"

permissions:
  network: "none"
  filesystem: "workspace-write"

dependencies:
  tools:
    - "bash"
    - "rg"
  python: []

tags:
  - "mindspore"
  - "aclnn"
  - "ascend"
  - "devflow"
