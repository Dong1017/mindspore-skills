schema_version: "1.0.0"
name: "npu-builder"
display_name: "NPU Builder"
description: "Route MindSpore Ascend NPU operator tasks to the ACLNN development path."
version: "0.1.0"

entry:
  type: "manual"
  path: "SKILL.md"

inputs:
  - name: "op_name"
    type: "string"
    required: true
    description: "Target operator name."
  - name: "path"
    type: "enum"
    required: false
    default: "aclnn"
    choices: ["aclnn"]
    description: "Current supported path in this phase."

outputs:
  report_schema: "skills/_shared/contract/report.schema.json"
  out_dir_layout: "runs/<run_id>/out/"

permissions:
  network: "none"
  filesystem: "workspace-write"

dependencies:
  tools:
    - "bash"
    - "rg"
  python: []

tags:
  - "mindspore"
  - "ascend"
  - "aclnn"
